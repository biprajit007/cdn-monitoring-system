version: "3.9"

networks:
  monitor-net:
    driver: bridge

services:
  server:
    build: ./server
    env_file: .env
    container_name: cdn-monitor
    networks: [monitor-net]
    expose:
      - "18443"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  agent:
    build: ./agent
    env_file: .env
    container_name: cdn-agent
    networks: [monitor-net]
    depends_on:
      - server
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: cdn-nginx
    networks: [monitor-net]
    depends_on:
      - server
    ports:
      - "18443:18443"
      - "18880:18880"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
