worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    log_format main '$remote_addr - [$time_local] "$request" $status "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream server_upstream {
        server server:18443;
        keepalive 32;
    }

    # HTTP redirect: port 18880 → HTTPS port 18443
    server {
        listen 18880;
        server_name cdn-monitor.rockstreamer.com;

        location / {
            return 301 https://cdn-monitor.rockstreamer.com:18443$request_uri;
        }
    }

    # Legacy agent ingest: http://cdn-monitor.rockstreamer.com:18080/api/metrics
    server {
        listen 18080;
        server_name cdn-monitor.rockstreamer.com;
        client_max_body_size 10m;

        location /api/metrics {
            proxy_pass http://server_upstream/api/metrics;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }
    }

    # HTTPS portal: https://cdn-monitor.rockstreamer.com:18443
    server {
        listen 18443 ssl http2;
        server_name cdn-monitor.rockstreamer.com;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               HIGH:!aNULL:!MD5:!RC4;
        ssl_prefer_server_ciphers on;
        ssl_session_cache         shared:SSL:20m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;
        ssl_stapling              on;
        ssl_stapling_verify       on;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options            SAMEORIGIN                           always;
        add_header X-Content-Type-Options     nosniff                              always;
        add_header X-XSS-Protection           "1; mode=block"                     always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"   always;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        location / {
            proxy_pass http://server_upstream;
        }

        location /api/ {
            proxy_pass http://server_upstream;
        }

        location /login {
            proxy_pass http://server_upstream;
        }
    }
}
